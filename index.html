<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cumpleaños IUTECP 🎂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .month-btn.active {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <div class="max-w-6xl mx-auto py-10 px-4">
        <header class="text-center mb-12">
            <div class="inline-block bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-sm font-bold mb-4 uppercase tracking-widest">
                IUTECP - Ingeniería de Información
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-2">
                🎈 Cumpleañeros
            </h1>
            <p id="sub-header" class="text-slate-500 text-lg">Celebraciones destacadas del equipo</p>
        </header>

        <div id="month-filters" class="flex flex-wrap justify-center gap-2 mb-12">
            <button id="btn-inicio" onclick="renderInitialScreen()" class="month-btn active px-5 py-2 rounded-xl bg-white border border-slate-200 hover:border-indigo-400 transition all shadow-sm font-medium">
                ✨ Próximos
            </button>
        </div>

        <div id="birthday-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        </div>
    </div>

    <script>
        const months = [
            "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", 
            "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
        ];

        const people = [
            { name: "Ing. Luis Blanco", day: 24, month: "Enero", color: "bg-blue-100" },
            { name: "Ing. Ismael Pernia", day: 22, month: "Enero", color: "bg-indigo-100" },
            { name: "Ing. Diego Torres", day: 24, month: "Enero", color: "bg-cyan-100" },
            { name: "Ing. Felix Ruiz", day: 06, month: "Febrero", color: "bg-emerald-100" },
            { name: "Ing. Kelvin Galindo", day: 23, month: "Febrero", color: "bg-pink-100" },
            { name: "Ing. Aracely Giral", day: 03, month: "Marzo", color: "bg-yellow-100" },
            { name: "Ing. Marco Rengifo", day: 05, month: "Marzo", color: "bg-purple-100" },
            { name: "Ing. Axel Alvarez", day: 09, month: "Marzo", color: "bg-orange-100" },
            { name: "Ing. Ricardo Pereira", day: 15, month: "Marzo", color: "bg-blue-100" },
            { name: "Ing. Isabel Galvan", day: 02, month: "Abril", color: "bg-pink-100" },
            { name: "Ing. Elena López", day: 28, month: "Abril", color: "bg-indigo-100" },
            { name: "Ing. Jeangel Martinez", day: 20, month: "Abril", color: "bg-emerald-100" },
            { name: "Ing. Jensheybert Rivas", day: 02, month: "Abril", color: "bg-cyan-100" },
            { name: "Ing. Roger Saulny", day: 09, month: "Mayo", color: "bg-yellow-100" },
            { name: "Ing. Maryander Torres", day: 07, month: "Junio", color: "bg-pink-100" },
            { name: "Ing. Yerson Roja", day: 30, month: "Junio", color: "bg-blue-100" },
            { name: "Ing. Anthony Urrutia", day: 18, month: "Junio", color: "bg-indigo-100" },
            { name: "Ing. Edward Camacho", day: 01, month: "Julio", color: "bg-blue-100" },
            { name: "Ing. Rawil Carias", day: 20, month: "Agosto", color: "bg-orange-100" },
            { name: "Ing. Aaron Colmenares", day: 17, month: "Agosto", color: "bg-yellow-100" },
            { name: "Ing. José Fermin", day: 31, month: "Agosto", color: "bg-emerald-100" },
            { name: "Ing. Anibal Figuera", day: 10, month: "Agosto", color: "bg-pink-100" },
            { name: "Ing. Julio Navas", day: 05, month: "Agosto", color: "bg-indigo-100" },
            { name: "Ing. Franky Nucette", day: 28, month: "Agosto", color: "bg-blue-100" },
            { name: "Ing. Emily Toro", day: 22, month: "Agosto", color: "bg-pink-100" },
            { name: "Ing. Gerardo Tadino", day: 18, month: "Septiembre", color: "bg-cyan-100" },
            { name: "Ing. Valery Hurtado", day: 30, month: "Septiembre", color: "bg-purple-100" },
            { name: "Ing. Royber Marin", day: 17, month: "Septiembre", color: "bg-orange-100" },
            { name: "Ing. David Pereda", day: 07, month: "Septiembre", color: "bg-yellow-100" },
            { name: "Ing. Freddy Serrano", day: 17, month: "Octubre", color: "bg-emerald-100" },
            { name: "Ing. Jean Pierre", day: 25, month: "Octubre", color: "bg-blue-100" },
            { name: "Ing. Jose Rojas", day: 19, month: "Octubre", color: "bg-indigo-100" },
            { name: "Ing. Moises Vera", day: 03, month: "Octubre", color: "bg-pink-100" },
            { name: "Ing. Kevin Acosta", day: 27, month: "Noviembre", color: "bg-indigo-100" },
            { name: "Ing. Lisandro Jimenez", day: 19, month: "Noviembre", color: "bg-orange-100" },
            { name: "Ing. Jesus Mata", day: 08, month: "Noviembre", color: "bg-blue-100" },
            { name: "Ing. Carlos López", day: 11, month: "Diciembre", color: "bg-emerald-100" },
            { name: "Ing. Paola Rada", day: 10, month: "Diciembre", color: "bg-pink-100" },
            { name: "Ing. Dilan Rojas", day: 27, month: "Diciembre", color: "bg-cyan-100" }
        ];

        function createMonthButtons() {
            const container = document.getElementById('month-filters');
            months.forEach(month => {
                const btn = document.createElement('button');
                btn.innerText = month;
                btn.className = "month-btn px-5 py-2 rounded-xl bg-white border border-slate-200 hover:border-indigo-400 transition all shadow-sm font-medium";
                btn.onclick = () => filterMonth(month);
                container.appendChild(btn);
            });
        }

        // --- NUEVA LÓGICA DE PANTALLA INICIAL ---
        function renderInitialScreen() {
            const grid = document.getElementById('birthday-grid');
            const subHeader = document.getElementById('sub-header');
            grid.innerHTML = '';
            
            // Gestionar botones
            const btns = document.querySelectorAll('.month-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-inicio').classList.add('active');

            const now = new Date();
            const currentMonthIdx = now.getMonth(); 
            const nextMonthIdx = (currentMonthIdx + 1) % 12;

            const currentMonthName = months[currentMonthIdx];
            const nextMonthName = months[nextMonthIdx];

            subHeader.innerText = `Próximos cumpleañeros de ${currentMonthName} y ${nextMonthName}`;

            // Filtrar personas de ambos meses
            const filtered = people.filter(p => p.month === currentMonthName || p.month === nextMonthName);

            // Ordenar: primero los de este mes por día, luego los del mes que sigue por día
            filtered.sort((a, b) => {
                const monthA = months.indexOf(a.month);
                const monthB = months.indexOf(b.month);
                
                // Caso especial diciembre-enero
                const adjustedMonthA = (monthA < currentMonthIdx) ? monthA + 12 : monthA;
                const adjustedMonthB = (monthB < currentMonthIdx) ? monthB + 12 : monthB;

                if (adjustedMonthA !== adjustedMonthB) return adjustedMonthA - adjustedMonthB;
                return a.day - b.day;
            });

            renderCards(filtered, grid);
        }

        function filterMonth(monthName) {
            const grid = document.getElementById('birthday-grid');
            const subHeader = document.getElementById('sub-header');
            grid.innerHTML = '';

            // Estilo de botones
            const btns = document.querySelectorAll('.month-btn');
            btns.forEach(btn => {
                if(btn.innerText === monthName) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            subHeader.innerText = `Cumpleañeros de ${monthName}`;
            const filtered = people.filter(p => p.month === monthName).sort((a, b) => a.day - b.day);
            renderCards(filtered, grid, monthName);
        }

        function renderCards(list, container, filterName = '') {
            if (list.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                        <p class="text-slate-400 text-lg">No hay cumpleañeros registrados 🍰</p>
                    </div>`;
                return;
            }

            list.forEach(person => {
                const card = `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-4 hover:scale-105 transition-transform duration-300">
                        <div class="w-14 h-14 ${person.color || 'bg-slate-100'} rounded-full flex items-center justify-center text-2xl shadow-inner">
                            🎂
                        </div>
                        <div>
                            <h3 class="font-bold text-slate-900 text-lg leading-tight">${person.name}</h3>
                            <p class="text-indigo-600 font-medium text-sm">${person.day} de ${person.month}</p>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // Iniciar
        createMonthButtons();
        renderInitialScreen(); // Ahora inicia con la pantalla de próximos
    </script>
</body>
</html>
