<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cumpleaños IUTECP 🥳</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top right, #f8faff 0%, #ffffff 50%, #f1f5ff 100%);
            min-height: 100vh;
        }

        /* BOTÓN ACTIVO: Morado con texto Blanco resaltado */
        .month-btn.active {
            background: #4f46e5 !important;
            color: #ffffff !important;
            box-shadow: 0 12px 20px -5px rgba(79, 70, 229, 0.4);
            transform: translateY(-3px);
            border-color: #4338ca;
        }
        
        /* El número dentro del botón activo */
        .month-btn.active .count-badge {
            color: #ffffff !important;
            opacity: 1 !important;
            font-weight: bold;
        }

        /* Animaciones de las tarjetas */
        .card-birthday:hover .cake-icon {
            transform: scale(1.2) translateY(-5px) rotate(10deg);
        }
        
        .cake-icon {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body class="text-slate-800 font-sans antialiased">

    <div class="max-w-6xl mx-auto py-12 px-4">
        <header class="text-center mb-14">
            <div class="inline-block bg-indigo-50 text-indigo-600 px-6 py-1.5 rounded-full text-xs font-bold mb-6 uppercase tracking-[0.2em] border border-indigo-100 shadow-sm">
                IUTECP • Ingeniería de Información
            </div>
            <h1 class="text-4xl md:text-6xl font-black text-slate-900 mb-4 tracking-tight">
                🥳 🎈 Cumpleañeros 🎂 🎉
            </h1>
            <p id="sub-header" class="text-slate-500 text-lg font-medium">Organizando el calendario...</p>
        </header>

        <div id="month-filters" class="flex flex-wrap justify-center gap-4 mb-16">
            <button id="btn-inicio" onclick="renderInitialScreen()" 
                class="month-btn active px-8 py-3 rounded-2xl bg-white border border-slate-200 hover:border-indigo-300 transition-all duration-300 shadow-sm font-bold text-lg flex items-center gap-3">
                ✨ Próximos <span id="count-proximos" class="count-badge text-sm font-semibold opacity-60 bg-black/5 px-2 py-0.5 rounded-lg"></span>
            </button>
        </div>

        <div id="birthday-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
        </div>
    </div>

    <script>
        const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        const people = [
            { name: "Ing. Luis Blanco", day: 24, month: "Enero", color: "bg-blue-100" },
            { name: "Ing. Ismael Pernia", day: 22, month: "Enero", color: "bg-indigo-100" },
            { name: "Ing. Diego Torres", day: 24, month: "Enero", color: "bg-cyan-100" },
            { name: "Ing. Felix Ruiz", day: 06, month: "Febrero", color: "bg-emerald-100" },
            { name: "Ing. Kelvin Galindo", day: 23, month: "Febrero", color: "bg-pink-100" },
            { name: "Ing. Aracely Giral", day: 03, month: "Marzo", color: "bg-yellow-100" },
            { name: "Ing. Marco Rengifo", day: 05, month: "Marzo", color: "bg-purple-100" },
            { name: "Ing. Axel Alvarez", day: 09, month: "Marzo", color: "bg-orange-100" },
            { name: "Ing. Ricardo Pereira", day: 15, month: "Marzo", color: "bg-blue-100" },
            { name: "Ing. Isabel Galvan", day: 02, month: "Abril", color: "bg-pink-100" },
            { name: "Ing. Elena López", day: 28, month: "Abril", color: "bg-indigo-100" },
            { name: "Ing. Jeangel Martinez", day: 20, month: "Abril", color: "bg-emerald-100" },
            { name: "Ing. Jensheybert Rivas", day: 02, month: "Abril", color: "bg-cyan-100" },
            { name: "Ing. Roger Saulny", day: 09, month: "Mayo", color: "bg-yellow-100" },
            { name: "Ing. Maryander Torres", day: 07, month: "Junio", color: "bg-pink-100" },
            { name: "Ing. Yerson Roja", day: 30, month: "Junio", color: "bg-blue-100" },
            { name: "Ing. Anthony Urrutia", day: 18, month: "Junio", color: "bg-indigo-100" },
            { name: "Ing. Edward Camacho", day: 01, month: "Julio", color: "bg-blue-100" },
            { name: "Ing. Rawil Carias", day: 20, month: "Agosto", color: "bg-orange-100" },
            { name: "Ing. Aaron Colmenares", day: 17, month: "Agosto", color: "bg-yellow-100" },
            { name: "Ing. José Fermin", day: 31, month: "Agosto", color: "bg-emerald-100" },
            { name: "Ing. Anibal Figuera", day: 10, month: "Agosto", color: "bg-pink-100" },
            { name: "Ing. Julio Navas", day: 05, month: "Agosto", color: "bg-indigo-100" },
            { name: "Ing. Franky Nucette", day: 28, month: "Agosto", color: "bg-blue-100" },
            { name: "Ing. Emily Toro", day: 22, month: "Agosto", color: "bg-pink-100" },
            { name: "Ing. Gerardo Tadino", day: 18, month: "Septiembre", color: "bg-cyan-100" },
            { name: "Ing. Valery Hurtado", day: 30, month: "Septiembre", color: "bg-purple-100" },
            { name: "Ing. Royber Marin", day: 17, month: "Septiembre", color: "bg-orange-100" },
            { name: "Ing. David Pereda", day: 07, month: "Septiembre", color: "bg-yellow-100" },
            { name: "Ing. Freddy Serrano", day: 17, month: "Octubre", color: "bg-emerald-100" },
            { name: "Ing. Jean Pierre", day: 25, month: "Octubre", color: "bg-blue-100" },
            { name: "Ing. Jose Rojas", day: 19, month: "Octubre", color: "bg-indigo-100" },
            { name: "Ing. Moises Vera", day: 03, month: "Octubre", color: "bg-pink-100" },
            { name: "Ing. Kevin Acosta", day: 27, month: "Noviembre", color: "bg-indigo-100" },
            { name: "Ing. Lisandro Jimenez", day: 19, month: "Noviembre", color: "bg-orange-100" },
            { name: "Ing. Jesus Mata", day: 08, month: "Noviembre", color: "bg-blue-100" },
            { name: "Ing. Carlos López", day: 11, month: "Diciembre", color: "bg-emerald-100" },
            { name: "Ing. Paola Rada", day: 10, month: "Diciembre", color: "bg-pink-100" },
            { name: "Ing. Dilan Rojas", day: 27, month: "Diciembre", color: "bg-cyan-100" }
        ];

        function createMonthButtons() {
            const container = document.getElementById('month-filters');
            const counts = people.reduce((acc, p) => {
                acc[p.month] = (acc[p.month] || 0) + 1;
                return acc;
            }, {});

            months.forEach(month => {
                const count = counts[month] || 0;
                const btn = document.createElement('button');
                btn.innerHTML = `${month} <span class="count-badge text-sm ml-2 opacity-60 font-semibold">(${count})</span>`;
                btn.className = "month-btn px-6 py-3 rounded-2xl bg-white border border-slate-200 hover:border-indigo-300 transition-all duration-300 shadow-sm font-bold text-lg text-slate-700 flex items-center";
                btn.onclick = () => filterMonth(month);
                container.appendChild(btn);
            });
        }

        function renderInitialScreen() {
            const grid = document.getElementById('birthday-grid');
            const subHeader = document.getElementById('sub-header');
            grid.innerHTML = '';
            
            document.querySelectorAll('.month-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-inicio').classList.add('active');

            const now = new Date();
            const currentMonthIdx = now.getMonth(); 
            const nextMonthIdx = (currentMonthIdx + 1) % 12;

            const filtered = people.filter(p => p.month === months[currentMonthIdx] || p.month === months[nextMonthIdx]);
            document.getElementById('count-proximos').innerText = `(${filtered.length})`;

            subHeader.innerHTML = `✨ Próximos de <span class="text-indigo-600 font-black">${months[currentMonthIdx]}</span> y <span class="text-indigo-600 font-black">${months[nextMonthIdx]}</span>`;

            filtered.sort((a, b) => {
                const mIdxA = months.indexOf(a.month);
                const mIdxB = months.indexOf(b.month);
                const adjA = (mIdxA < currentMonthIdx) ? mIdxA + 12 : mIdxA;
                const adjB = (mIdxB < currentMonthIdx) ? mIdxB + 12 : mIdxB;
                if (adjA !== adjB) return adjA - adjB;
                return a.day - b.day;
            });

            renderCards(filtered, grid);
        }

        function filterMonth(monthName) {
            const grid = document.getElementById('birthday-grid');
            const subHeader = document.getElementById('sub-header');
            grid.innerHTML = '';

            document.querySelectorAll('.month-btn').forEach(btn => {
                if(btn.innerText.includes(monthName + " (") || btn.id === 'btn-inicio') {
                    if (btn.innerText.includes(monthName + " (")) btn.classList.add('active');
                    else btn.classList.remove('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            subHeader.innerHTML = `Celebraciones de <span class="text-indigo-600 font-black">${monthName}</span>`;
            const filtered = people.filter(p => p.month === monthName).sort((a, b) => a.day - b.day);
            renderCards(filtered, grid);
        }

        function renderCards(list, container) {
            if (list.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-20 glass-card rounded-[3rem] border-2 border-dashed border-slate-200">
                        <p class="text-slate-400 text-2xl font-bold">Sin cumpleañeros 🍰</p>
                    </div>`;
                return;
            }

            list.forEach(person => {
                const card = `
                    <div class="card-birthday glass-card p-6 rounded-[2.5rem] shadow-xl shadow-indigo-500/5 flex items-center space-x-6 hover:scale-105 transition-all duration-300 group cursor-pointer overflow-hidden border-2 border-transparent hover:border-indigo-100">
                        <div class="w-20 h-20 ${person.color || 'bg-slate-100'} rounded-3xl flex items-center justify-center text-4xl shadow-inner relative flex-shrink-0">
                            <span class="cake-icon relative z-10">🎂</span>
                        </div>
                        <div>
                            <h3 class="font-black text-slate-900 text-xl leading-tight group-hover:text-indigo-600 transition-colors">${person.name}</h3>
                            <p class="text-indigo-500 font-black text-base tracking-wide mt-1">${person.day} de ${person.month}</p>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        createMonthButtons();
        renderInitialScreen();
    </script>
</body>
</html>
