<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cumpleaños IUTECP 🎂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .month-btn.active {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <div class="max-w-6xl mx-auto py-10 px-4">
        <header class="text-center mb-12">
            <div class="inline-block bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-sm font-bold mb-4 uppercase tracking-widest">
                IUTECP - Ingeniería de Información
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-2">
                🎈 Cumpleañeros
            </h1>
            <p class="text-slate-500 text-lg">Calendario de celebraciones del equipo</p>
        </header>

        <div id="month-filters" class="flex flex-wrap justify-center gap-2 mb-12">
            <button onclick="filterMonth('Todos')" class="month-btn active px-5 py-2 rounded-xl bg-white border border-slate-200 hover:border-indigo-400 transition all shadow-sm font-medium">
                Todos
            </button>
            </div>

        <div id="birthday-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </div>

    <script>
        // LISTA DE MESES
        const months = [
            "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", 
            "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
        ];

        // DATOS DE LAS PERSONAS (Aquí agregas a todos)
        const people = [
            { name: "Ana García", day: 5, month: "Enero", color: "bg-pink-100" },
            { name: "Carlos Ruiz", day: 12, month: "Marzo", color: "bg-blue-100" },
            { name: "Roger Saulny", day: 09, month: "Mayo", color: "bg-yellow-100" },
            { name: "Ing. Julio Mendoza", day: 05, month: "Agosto", color: "bg-indigo-100" },
            { name: "Ing. Jesus Mata", day: 08, month: "Noviembre", color: "bg-blue-100" },
            { name: "Ing. Kevin Acosta", day: 27, month: "Noviembre", color: "bg-indigo-100" },
            { name: "Marta Rivas", day: 22, month: "Diciembre", color: "bg-emerald-100" },
            // Puedes seguir agregando más aquí...
        ];

        // Función para crear los botones de meses automáticamente
        function createMonthButtons() {
            const container = document.getElementById('month-filters');
            months.forEach(month => {
                const btn = document.createElement('button');
                btn.innerText = month;
                btn.className = "month-btn px-5 py-2 rounded-xl bg-white border border-slate-200 hover:border-indigo-400 transition all shadow-sm font-medium";
                btn.onclick = () => filterMonth(month);
                container.appendChild(btn);
            });
        }

        function renderBirthdays(monthFilter = 'Todos') {
            const grid = document.getElementById('birthday-grid');
            grid.innerHTML = '';

            // Filtrar
            const filtered = monthFilter === 'Todos' 
                ? people 
                : people.filter(p => p.month === monthFilter);

            // Si no hay nadie
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                        <p class="text-slate-400 text-lg">No hay cumpleañeros en ${monthFilter} 🍰</p>
                    </div>`;
                return;
            }

            // Ordenar por día y mostrar
            filtered.sort((a, b) => a.day - b.day).forEach(person => {
                const card = `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-4 hover:scale-105 transition-transform duration-300">
                        <div class="w-14 h-14 ${person.color || 'bg-slate-100'} rounded-full flex items-center justify-center text-2xl shadow-inner">
                            🎂
                        </div>
                        <div>
                            <h3 class="font-bold text-slate-900 text-lg leading-tight">${person.name}</h3>
                            <p class="text-indigo-600 font-medium text-sm">${person.day} de ${person.month}</p>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function filterMonth(month) {
            // Actualizar botones (clase active)
            const btns = document.querySelectorAll('.month-btn');
            btns.forEach(btn => {
                if(btn.innerText === month) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            renderBirthdays(month);
        }

        // Ejecutar al cargar
        createMonthButtons();
        renderBirthdays();
    </script>
</body>
</html>
